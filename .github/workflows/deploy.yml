name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-origami
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: invoke deploy.sh on host
        run: /opt/stack/services/public/myazit.kr/origami/repo/scripts/deploy.sh
